<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze Map Editor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 24px; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 24px; }
  .layout { display: flex; gap: 24px; flex-wrap: wrap; }
  .editor-col { flex: 0 0 auto; }
  .side-col { flex: 1; min-width: 260px; display: flex; flex-direction: column; gap: 16px; }
  #grid-canvas { display: block; cursor: crosshair; border: 1px solid #ccc; border-radius: 6px; background: #000; }
  .card { background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 16px; }
  .card h2 { font-size: 15px; font-weight: 500; margin-bottom: 12px; }
  label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
  input[type=text] { width: 100%; padding: 8px 10px; border: 0.5px solid #ccc; border-radius: 6px; font-size: 14px; outline: none; }
  input[type=text]:focus { border-color: #888; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: 0.5px solid #bbb; border-radius: 6px; font-size: 14px; background: transparent; cursor: pointer; transition: background 0.1s; }
  .btn:hover { background: #f0f0f0; }
  .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn-primary:hover { background: #333; }
  .btn-danger { border-color: #e55; color: #c33; }
  .btn-danger:hover { background: #fff0f0; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .tool-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .tool-btn { flex: 1; padding: 7px; border: 0.5px solid #ccc; border-radius: 6px; font-size: 13px; background: transparent; cursor: pointer; }
  .tool-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .map-list { display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; }
  .map-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border: 0.5px solid #ddd; border-radius: 6px; font-size: 13px; }
  .map-item-name { font-weight: 500; }
  .map-item-date { font-size: 11px; color: #999; margin-top: 2px; }
  .status { font-size: 13px; padding: 8px 10px; border-radius: 6px; }
  .status.success { background: #eafaf1; color: #1a7a45; }
  .status.error { background: #fdf0f0; color: #c0392b; }
  .status.info { background: #eef4ff; color: #2c5aa0; }
  #status-msg { display: none; }
  .config-note { font-size: 12px; color: #888; background: #fffbe6; border: 0.5px solid #e6d96a; border-radius: 6px; padding: 8px 10px; }
</style>
</head>
<body>

<h1>Maze Map Editor</h1>
<p class="subtitle">Draw a 32×32 maze — each cell = 4×4 pixels on the CC3200 OLED. Click or drag to paint walls.</p>

<div class="layout">
  <div class="editor-col">
    <canvas id="grid-canvas" width="512" height="512"></canvas>
    <div style="margin-top:8px; font-size:12px; color:#888;">512px canvas → 32×32 grid → 128×128 on OLED</div>
  </div>

  <div class="side-col">

    <div class="card">
      <h2>Tools</h2>
      <div class="tool-row">
        <button class="tool-btn active" id="tool-wall" onclick="setTool('wall')">✦ Wall</button>
        <button class="tool-btn" id="tool-erase" onclick="setTool('erase')">✕ Erase</button>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="clearGrid()">Clear all</button>
        <button class="btn" onclick="fillBorder()">Add border</button>
      </div>
    </div>

    <div class="card">
      <h2>Save map</h2>
      <div class="config-note" style="margin-bottom:12px;">
        Set <code>API_URL</code> at the top of this file to your API Gateway invoke URL.
      </div>
      <label>Map name</label>
      <input type="text" id="map-name" placeholder="e.g. Forest maze" style="margin-bottom:12px;" />
      <button class="btn btn-primary" onclick="saveMap()" style="width:100%">Save to cloud</button>
      <div id="status-msg" class="status" style="margin-top:10px;"></div>
    </div>

    <div class="card">
      <h2>Saved maps</h2>
      <div class="btn-row" style="margin-bottom:12px;">
        <button class="btn" onclick="loadMapList()">↻ Refresh</button>
      </div>
      <div class="map-list" id="map-list">
        <div style="font-size:13px; color:#999;">Click refresh to load saved maps.</div>
      </div>
    </div>

  </div>
</div>

<script>
const API_URL = 'https://YOUR_API_ID.execute-api.us-east-1.amazonaws.com/prod';

const COLS = 32, ROWS = 32, CELL = 16;
const canvas = document.getElementById('grid-canvas');
const ctx = canvas.getContext('2d');
const grid = Array.from({length: ROWS}, () => new Uint8Array(COLS));
let tool = 'wall';
let painting = false;

function setTool(t) {
  tool = t;
  document.getElementById('tool-wall').classList.toggle('active', t === 'wall');
  document.getElementById('tool-erase').classList.toggle('active', t === 'erase');
}

function drawGrid() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.fillStyle = grid[r][c] ? '#3a7bd5' : '#111';
      ctx.fillRect(c * CELL, r * CELL, CELL - 1, CELL - 1);
    }
  }
}

function cellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  return { c: Math.floor(x / CELL), r: Math.floor(y / CELL) };
}

function paint(e) {
  const { c, r } = cellFromEvent(e);
  if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
    grid[r][c] = tool === 'wall' ? 1 : 0;
    drawGrid();
  }
}

canvas.addEventListener('mousedown', e => { painting = true; paint(e); });
canvas.addEventListener('mousemove', e => { if (painting) paint(e); });
canvas.addEventListener('mouseup', () => painting = false);
canvas.addEventListener('mouseleave', () => painting = false);

canvas.addEventListener('touchstart', e => { painting = true; paint(e.touches[0]); e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchmove', e => { if (painting) paint(e.touches[0]); e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend', () => painting = false);

function clearGrid() {
  for (let r = 0; r < ROWS; r++) grid[r].fill(0);
  drawGrid();
}

function fillBorder() {
  for (let c = 0; c < COLS; c++) { grid[0][c] = 1; grid[ROWS-1][c] = 1; }
  for (let r = 0; r < ROWS; r++) { grid[r][0] = 1; grid[r][COLS-1] = 1; }
  drawGrid();
}

function gridToHex() {
  let hex = '';
  for (let byteIdx = 0; byteIdx < 128; byteIdx++) {
    let byte = 0;
    for (let bit = 0; bit < 8; bit++) {
      const cellIdx = byteIdx * 8 + bit;
      const r = Math.floor(cellIdx / COLS);
      const c = cellIdx % COLS;
      if (r < ROWS && grid[r][c]) byte |= (1 << (7 - bit));
    }
    hex += byte.toString(16).padStart(2, '0');
  }
  return hex;
}

function hexToGrid(hex) {
  for (let r = 0; r < ROWS; r++) grid[r].fill(0);
  for (let byteIdx = 0; byteIdx < 128; byteIdx++) {
    const byte = parseInt(hex.substr(byteIdx * 2, 2), 16);
    for (let bit = 0; bit < 8; bit++) {
      const cellIdx = byteIdx * 8 + bit;
      const r = Math.floor(cellIdx / COLS);
      const c = cellIdx % COLS;
      if (r < ROWS && (byte & (1 << (7 - bit)))) grid[r][c] = 1;
    }
  }
  drawGrid();
}

function showStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status ' + type;
  el.style.display = 'block';
  if (type === 'success') setTimeout(() => { el.style.display = 'none'; }, 4000);
}

async function saveMap() {
  const name = document.getElementById('map-name').value.trim();
  if (!name) { showStatus('Enter a map name first.', 'error'); return; }
  const grid_hex = gridToHex();
  showStatus('Saving...', 'info');
  try {
    const res = await fetch(API_URL + '/maps', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, grid: grid_hex })
    });
    const data = await res.json();
    if (res.ok) {
      showStatus('Saved! Map ID: ' + data.mapId, 'success');
      loadMapList();
    } else {
      showStatus('Error: ' + (data.error || res.status), 'error');
    }
  } catch (e) {
    showStatus('Network error — check API_URL is set correctly.', 'error');
  }
}

async function loadMapList() {
  const listEl = document.getElementById('map-list');
  listEl.innerHTML = '<div style="font-size:13px;color:#999;">Loading...</div>';
  try {
    const res = await fetch(API_URL + '/maps');
    const maps = await res.json();
    if (!maps.length) {
      listEl.innerHTML = '<div style="font-size:13px;color:#999;">No maps saved yet.</div>';
      return;
    }
    maps.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
    listEl.innerHTML = maps.map(m => `
      <div class="map-item">
        <div>
          <div class="map-item-name">${escHtml(m.name)}</div>
          <div class="map-item-date">${m.createdAt ? m.createdAt.slice(0,10) : ''}</div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn" style="padding:4px 10px;font-size:12px;" onclick="loadMap('${m.mapId}')">Load</button>
        </div>
      </div>`).join('');
  } catch(e) {
    listEl.innerHTML = '<div style="font-size:13px;color:#c33;">Failed to load — check API_URL.</div>';
  }
}

async function loadMap(mapId) {
  try {
    const res = await fetch(API_URL + '/maps/' + mapId);
    const data = await res.json();
    hexToGrid(data.grid);
    document.getElementById('map-name').value = data.name;
    showStatus('Loaded: ' + data.name, 'success');
  } catch(e) {
    showStatus('Failed to load map.', 'error');
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

drawGrid();
</script>
</body>
</html>
